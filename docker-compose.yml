version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parking-management-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - parking-network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: parking-management-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - parking-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: parking-management-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: parking_management
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: password
      MYSQL_USER: parking_user
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - parking-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: parking-management-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    networks:
      - parking-network
    depends_on:
      - db

  redis:
    image: redis:alpine
    container_name: parking-management-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - parking-network
    volumes:
      - redisdata:/data

networks:
  parking-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  redisdata:
    driver: local

